name: Deploy to production

on:
  push:
    branches: [master]
  workflow_dispatch: # ручной запуск из вкладки Actions на всякий случай

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              root@217.149.30.67 \
              /usr/local/bin/deploy-dr-markaryan

      - name: Smoke check
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w "%{http_code}" https://dr-markaryan.ru/)
          echo "https://dr-markaryan.ru -> $code"
          test "$code" = "200"
